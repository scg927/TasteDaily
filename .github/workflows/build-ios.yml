name: Build iOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          xcodebuild -version

      - name: Build iOS framework (Debug)
        run: |
          ./gradlew :core:linkDebugFrameworkIosArm64 :core:linkDebugFrameworkIosSimulatorArm64 --console=plain

      - name: Build iOS framework (Release)
        run: |
          ./gradlew :core:linkReleaseFrameworkIosArm64 --console=plain

      - name: List framework output
        run: |
          echo "=== Release Framework ==="
          find core/build/bin/iosArm64/releaseFramework -name "*.framework" -type d 2>/dev/null || true
          echo "=== Debug Framework ==="
          find core/build/bin -name "*.framework" -type d 2>/dev/null || true

      - name: Upload framework artifact
        uses: actions/upload-artifact@v4
        with:
          name: TasteDailyCore-ios-framework
          path: |
            core/build/bin/iosArm64/releaseFramework/TasteDailyCore.framework
          retention-days: 30
